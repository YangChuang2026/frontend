<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>LabMind 控制台</title>
  <link rel="stylesheet" href="styles.css" />
  <script defer src="app.js"></script>
</head>
<body>
  <header>
    <h1>LabMind - 智能实验控制台</h1>
    <p class="sub">图形化界面用于与 AI Agent 对话并执行实验（原型）</p>
  </header>

  <main class="layout">
    <section class="left">
      <div class="card">
        <h2>实验指令（自然语言）</h2>
        <textarea id="prompt" placeholder="例如：用默认参数做一次拉伸测试，横截面积 50 mm²，标距 50 mm。" rows="4"></textarea>
        <button id="runBtn">运行智能体</button>
      </div>

      <div class="card">
        <h2>参数面板（可选）</h2>
        <div class="form-grid">
          <label>试样横截面积 So (mm²)<input id="so" type="number" step="0.01" /></label>
          <label>标距 L0 (mm)<input id="l0" type="number" step="0.1" /></label>
          <label>测试类型<select id="test_type"><option value="tensile">拉伸</option><option value="compression">压缩</option></select></label>
          <label>速度 speed_mm_s<input id="speed_mm_s" type="number" step="0.01" /></label>
          <label>最大位移 max_displacement<input id="max_displacement" type="number" step="0.1" /></label>
          <label>最大力 max_force<input id="max_force" type="number" step="1" /></label>
        </div>
        <small>若留空，系统将尝试使用历史推荐值并标注为默认。</small>
      </div>

      <div class="card" id="historyPanel">
        <h2>历史推荐（相似工作流）</h2>
        <div id="historyList">暂无历史记录（请先运行实验）</div>
        <button id="refreshHistory">刷新历史</button>
      </div>
    </section>

    <section class="center">
      <div class="card">
        <h2>参数对比 / 注入摘要</h2>
        <pre id="paramDiff">等待执行...</pre>
      </div>

      <div class="card">
        <h2>执行日志</h2>
        <div id="log" class="log"></div>
      </div>
    </section>

    <section class="right">
      <div class="card">
        <h2>结果面板</h2>
        <div id="results">无结果</div>
      </div>

      <div class="card">
        <h2>控制</h2>
        <button id="stopBtn" class="danger">紧急停止 (模拟)</button>
      </div>
    </section>
  </main>

  <footer>
    <small>前端原型 - 需要后端 API 支持：/api/agent/run, /api/agent/status, /api/agent/history</small>
  </footer>
</body>
</html>
